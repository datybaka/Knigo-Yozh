<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knigo-Yozh</title>
  <!-- Tailwind CSS + DaisyUI via CDN -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-base-300 text-base-content flex flex-col">

  <!-- Навигация -->
  <div class="navbar bg-base-100 shadow-lg px-4 sm:px-8">
    <div class="flex-1">
      <a class="btn btn-ghost text-xl font-bold tracking-wide text-primary">🦔 Knigo-Yozh</a>
    </div>
    <div class="flex-none gap-2">
      <span class="badge badge-outline badge-success" id="status-badge">API: Подключение...</span>
    </div>
  </div>

  <!-- Основной контент -->
  <main class="container mx-auto p-4 sm:p-6 flex-grow">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold">Каталог книг</h1>
      <button onclick="loadBooks()" class="btn btn-primary btn-sm">Обновить</button>
    </div>

    <!-- Контейнер для карточек -->
    <div id="books-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
      <div class="col-span-full text-center py-12 text-base-content/60">
        Загрузка данных с сервера...
      </div>
    </div>
  </main>

  <!-- Подключение скрипта -->
  <script src="app.js"></script>
</body>
</html>
