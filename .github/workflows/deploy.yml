name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  # Имя образа в нижнем регистре (требование GitHub Packages)
  IMAGE_NAME: ${{ github.repository_owner }}/knigo-yozh

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          
      - name: Run Tests
        run: dotnet test
        
  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # 1. Авторизация в бесплатном реестре образов GitHub
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. Сборка Docker-образа на мощностях GitHub и отправка в реестр
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      # 3. Копируем на сервер ТОЛЬКО файл конфигурации деплоя (без исходного кода)
      - name: Copy docker-compose to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml"
          target: "/home/app/knigoyozh"

      # 4. Обновление приложения на сервере
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /home/app/knigoyozh
            cd /home/app/knigoyozh
            
            # Решаем проблему из прошлого шага: создаем пустой .env, если его нет
            touch .env
            
            # Авторизуем сервер в GHCR, чтобы он мог скачать приватный образ
            echo ${{ secrets.GITHUB_TOKEN }} | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Скачиваем свежий скомпилированный образ и перезапускаем
            sudo docker compose -f docker-compose.prod.yml pull
            sudo docker compose -f docker-compose.prod.yml up -d
            
            # Удаляем старые зависшие образы, чтобы не забивать диск сервера
            sudo docker image prune -f