name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: datybaka/knigo-yozh-api

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run Tests
        run: dotnet test --configuration Release

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
      - name: Build and push Nginx image
        uses: docker/build-push-action@v5
        with:
          context: .
          # Указываем, что использовать нужно конкретный Dockerfile
          file: ./nginx/Dockerfile
          push: true
          # Тег будет отличаться (-nginx в конце)
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/knigo-yozh-nginx:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy deployment files via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: 22
          key: ${{ secrets.SERVER_SSH_KEY }}
          target: "/home/app/knigoyozh"
          source: "docker-compose.prod.yml,frontend/,nginx/"
          rm: false

- name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /home/app/knigoyozh
            cd /home/app/knigoyozh
            
            # 1. Генерируем .env файл с нуля при каждом деплое
            echo "POSTGRES_DB=knigoyozh_db" > .env
            echo "POSTGRES_USER=postgres" >> .env
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
            
            # ConnectionString собираем из переменных
            echo "ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=knigoyozh_db;Username=postgres;Password=${{ secrets.POSTGRES_PASSWORD }}" >> .env
            
            # JWT настройки
            echo "Jwt__Secret=${{ secrets.JWT_SECRET }}" >> .env
            echo "Jwt__Issuer=KnigoYozh" >> .env
            echo "Jwt__Audience=KnigoYozh" >> .env
            echo "Jwt__ExpirationMinutes=60" >> .env
            
            # 2. Авторизуемся в GHCR и пуллим образы
            echo ${{ secrets.GITHUB_TOKEN }} | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            sudo docker compose -f docker-compose.prod.yml pull
            sudo docker compose -f docker-compose.prod.yml up -d
            
            sudo docker image prune -f