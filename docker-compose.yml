services:
  postgres:
    image: postgres:16-alpine
    container_name: knigoyozh_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: local_password # Локальный пароль можно хардкодить
      POSTGRES_DB: knigoyozh_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

volumes:
  postgres_dev_data: